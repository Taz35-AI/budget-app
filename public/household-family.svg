<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Shared household">
  <!-- Cat (left, sitting) -->
  <g>
    <!-- ears -->
    <path d="M 18 55 L 15 46 L 22 52 Z" fill="currentColor" fill-opacity="0.08"/>
    <path d="M 34 55 L 37 46 L 30 52 Z" fill="currentColor" fill-opacity="0.08"/>
    <!-- head -->
    <circle cx="26" cy="58" r="8"/>
    <!-- eyes -->
    <circle cx="23" cy="58" r="0.8" fill="currentColor"/>
    <circle cx="29" cy="58" r="0.8" fill="currentColor"/>
    <!-- nose/mouth -->
    <path d="M 26 61 v 1.5"/>
    <!-- body (sitting) -->
    <path d="M 19 66 Q 17 80 22 88 L 36 88 Q 40 80 33 66"/>
    <!-- front legs -->
    <path d="M 23 88 v 4 M 28 88 v 4 M 33 88 v 4"/>
    <!-- tail curling up -->
    <path d="M 38 82 Q 52 80 52 68 Q 52 62 47 61"/>
  </g>

  <!-- Adult 1 -->
  <g>
    <circle cx="85" cy="20" r="9"/>
    <!-- body with shoulders arch -->
    <path d="M 72 56 Q 72 32 85 32 Q 98 32 98 56"/>
    <!-- torso -->
    <path d="M 85 56 v 20"/>
    <!-- arms (down at sides) -->
    <path d="M 74 50 v 22 M 96 50 v 22"/>
    <!-- legs -->
    <path d="M 85 76 L 79 94 M 85 76 L 91 94"/>
  </g>

  <!-- Adult 2 (holding hands with Adult 1) -->
  <g>
    <circle cx="125" cy="20" r="9"/>
    <path d="M 112 56 Q 112 32 125 32 Q 138 32 138 56"/>
    <path d="M 125 56 v 20"/>
    <path d="M 114 50 v 22 M 136 50 v 22"/>
    <path d="M 125 76 L 119 94 M 125 76 L 131 94"/>
  </g>
  <!-- holding hands between adults -->
  <path d="M 96 72 Q 105 70 114 72"/>

  <!-- Kid 1 (holding adult 2's hand) -->
  <g>
    <circle cx="165" cy="38" r="7"/>
    <path d="M 155 66 Q 155 50 165 50 Q 175 50 175 66"/>
    <path d="M 165 66 v 15"/>
    <path d="M 157 60 v 16 M 173 60 v 16"/>
    <path d="M 165 81 L 160 94 M 165 81 L 170 94"/>
  </g>
  <!-- holding hands -->
  <path d="M 136 76 Q 146 74 157 76"/>

  <!-- Kid 2 (smaller) -->
  <g>
    <circle cx="195" cy="42" r="6"/>
    <path d="M 186 68 Q 186 54 195 54 Q 204 54 204 68"/>
    <path d="M 195 68 v 13"/>
    <path d="M 188 62 v 14 M 202 62 v 14"/>
    <path d="M 195 81 L 191 94 M 195 81 L 199 94"/>
  </g>
  <!-- kid 2 holding kid 1's hand -->
  <path d="M 173 76 Q 181 74 188 76"/>

  <!-- Dog (right, standing) -->
  <g>
    <!-- tail curling up -->
    <path d="M 238 70 Q 228 64 232 54"/>
    <!-- body -->
    <path d="M 242 70 Q 240 88 245 92 L 280 92 Q 286 88 286 70"/>
    <!-- legs -->
    <path d="M 247 92 v 3 M 257 92 v 3 M 272 92 v 3 M 282 92 v 3"/>
    <!-- neck/chest -->
    <path d="M 286 70 Q 290 64 298 64"/>
    <!-- head (floppy ears) -->
    <circle cx="302" cy="68" r="9"/>
    <!-- snout -->
    <path d="M 309 70 Q 315 70 316 74 Q 316 78 311 78 L 310 76"/>
    <!-- ear (floppy) -->
    <path d="M 298 60 Q 294 55 296 68"/>
    <!-- eye -->
    <circle cx="303" cy="66" r="0.9" fill="currentColor"/>
    <!-- nose -->
    <circle cx="316" cy="74" r="1.2" fill="currentColor"/>
  </g>

  <!-- Ground line (subtle) -->
  <path d="M 10 95 L 330 95" stroke-opacity="0.15" stroke-dasharray="2 4"/>
</svg>
